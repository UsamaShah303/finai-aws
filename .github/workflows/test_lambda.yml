name: Test Lambda Function

on:
  push:
    branches:
      - main

jobs:
  test-lambda:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Debug API Gateway + Lambda
        run: |
          SUPA_URL="https://iaozluyveedsascwjgsv.supabase.co"
          SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlhb3psdXl2ZWVkc2FzY3dqZ3N2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjI2OTcsImV4cCI6MjA5NDY5ODY5N30.1MErkTaUBL4NMYWM2bx8sWky5KID6tADhXWeqwRV0Hs"
          
          # Step 1: Check API Gateway integration URIs
          echo "=== STEP 1: API Gateway Integrations ===" > debug.txt
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='finai-api-v2-production'].id" --output text)
          echo "API ID: $API_ID" >> debug.txt
          
          # List ALL resources and their integration URIs
          aws apigateway get-resources --rest-api-id $API_ID --query "items[*].{path: path, methods: resourceMethods}" --output json >> debug.txt 2>&1
          
          # Check the ANY method integration on the proxy resource  
          echo "=== Proxy resource integration ===" >> debug.txt
          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/{proxy+}'].id" --output text)
          echo "Proxy resource ID: $PROXY_ID" >> debug.txt
          
          if [ -n "$PROXY_ID" ] && [ "$PROXY_ID" != "None" ]; then
            aws apigateway get-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --output json >> debug.txt 2>&1 || echo "No ANY method" >> debug.txt
          fi
          
          # Step 2: Warm up Lambda (invoke it once so cold start is done)
          echo "=== STEP 2: Warming up Lambda ===" >> debug.txt
          aws lambda invoke \
            --function-name finai-api-v2-production-docker \
            --payload '{"resource": "/api/health", "path": "/api/health", "httpMethod": "GET", "headers": {"Host": "test"}, "requestContext": {"resourcePath": "/api/health", "httpMethod": "GET", "path": "/production/api/health", "stage": "production"}, "body": null, "isBase64Encoded": false}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            warmup_response.json >> debug.txt 2>&1
          echo "Warmup response:" >> debug.txt
          cat warmup_response.json >> debug.txt
          
          # Step 3: Wait and then test via API Gateway
          echo "=== STEP 3: Test via API Gateway (after warmup) ===" >> debug.txt
          sleep 2
          curl -s -w "\nHTTP_CODE:%{http_code}\nTIME_TOTAL:%{time_total}s\n" \
            "https://${API_ID}.execute-api.us-east-2.amazonaws.com/production/api/health" >> debug.txt 2>&1
          
          # Step 4: Test login via API Gateway
          echo "=== STEP 4: Test login via API Gateway ===" >> debug.txt
          curl -s -w "\nHTTP_CODE:%{http_code}\nTIME_TOTAL:%{time_total}s\n" \
            -X POST "https://${API_ID}.execute-api.us-east-2.amazonaws.com/production/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"hassamshah18@gmail.com","password":"123456"}' >> debug.txt 2>&1
          
          # Send all to Supabase
          OUT_B64=$(cat debug.txt | jq -Rs .)
          curl -s -X PATCH "$SUPA_URL/rest/v1/users?email=eq.hassamshah18@gmail.com" \
               -H "apikey: $SUPA_KEY" \
               -H "Authorization: Bearer $SUPA_KEY" \
               -H "Content-Type: application/json" \
               -H "Prefer: return=minimal" \
               -d "{\"name\": $OUT_B64}"
