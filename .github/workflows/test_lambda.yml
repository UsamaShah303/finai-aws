name: Test Lambda Function

on:
  push:
    branches:
      - main

jobs:
  test-lambda:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Verify Lambda Code (User Steps 1-3)
        run: |
          # Step 1
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Updating function code..."
          aws lambda update-function-code \
            --function-name finai-api-v2-production-docker \
            --image-uri ${ACCOUNT_ID}.dkr.ecr.us-east-2.amazonaws.com/finai-api-image:latest \
            --region us-east-2 || echo "Failed to update"
            
          # Wait a few seconds for update
          sleep 10
          
          # Step 2
          echo "Checking LastModified timestamp..."
          aws lambda get-function \
            --function-name finai-api-v2-production-docker \
            --region us-east-2 \
            --query "Configuration.LastModified"
            
          # Step 3
          # To see the actual lambda_handler.py inside the ECR image
          aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.us-east-2.amazonaws.com
          docker pull ${ACCOUNT_ID}.dkr.ecr.us-east-2.amazonaws.com/finai-api-image:latest
          echo "Content of lambda_handler.py in image:"
          docker run --rm --entrypoint cat ${ACCOUNT_ID}.dkr.ecr.us-east-2.amazonaws.com/finai-api-image:latest /var/task/lambda_handler.py > lambda_handler_content.txt
          cat lambda_handler_content.txt
          
          # Save content to Supabase to read it
          OUT_B64=$(cat lambda_handler_content.txt | jq -Rs .)
          SUPA_URL="https://iaozluyveedsascwjgsv.supabase.co"
          SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlhb3psdXl2ZWVkc2FzY3dqZ3N2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjI2OTcsImV4cCI6MjA5NDY5ODY5N30.1MErkTaUBL4NMYWM2bx8sWky5KID6tADhXWeqwRV0Hs"
          
          curl -X PATCH "$SUPA_URL/rest/v1/users?email=eq.hassamshah18@gmail.com" \
               -H "apikey: $SUPA_KEY" \
               -H "Authorization: Bearer $SUPA_KEY" \
               -H "Content-Type: application/json" \
               -H "Prefer: return=minimal" \
               -d "{\"name\": $OUT_B64}"
