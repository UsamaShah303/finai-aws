name: Test Lambda Function

on:
  push:
    branches:
      - main

jobs:
  test-lambda:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Fix API Gateway Integration
        run: |
          SUPA_URL="https://iaozluyveedsascwjgsv.supabase.co"
          SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlhb3psdXl2ZWVkc2FzY3dqZ3N2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjI2OTcsImV4cCI6MjA5NDY5ODY5N30.1MErkTaUBL4NMYWM2bx8sWky5KID6tADhXWeqwRV0Hs"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='finai-api-v2-production'].id" --output text)
          
          echo "=== Fixing API Gateway ===" > debug.txt
          echo "Account: $ACCOUNT_ID" >> debug.txt
          echo "API ID: $API_ID" >> debug.txt
          
          # Fix the proxy resource integration - remove credentials (use resource-based policy instead)
          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/{proxy+}'].id" --output text)
          ROOT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/'].id" --output text)
          
          LAMBDA_URI="arn:aws:apigateway:us-east-2:lambda:path/2015-03-31/functions/arn:aws:lambda:us-east-2:${ACCOUNT_ID}:function:finai-api-v2-production-docker/invocations"
          
          echo "Lambda URI: $LAMBDA_URI" >> debug.txt
          echo "Proxy ID: $PROXY_ID" >> debug.txt
          echo "Root ID: $ROOT_ID" >> debug.txt
          
          # Update proxy resource - remove credentials to use Lambda resource-based policy
          for RES_ID in $PROXY_ID $ROOT_ID; do
            for METHOD in ANY; do
              echo "Updating $RES_ID $METHOD..." >> debug.txt
              aws apigateway put-integration \
                --rest-api-id $API_ID \
                --resource-id $RES_ID \
                --http-method $METHOD \
                --type AWS_PROXY \
                --integration-http-method POST \
                --uri "$LAMBDA_URI" \
                --passthrough-behavior WHEN_NO_MATCH \
                >> debug.txt 2>&1
            done
          done
          
          # Add Lambda permission for API Gateway
          echo "Adding Lambda permission..." >> debug.txt
          aws lambda add-permission \
            --function-name finai-api-v2-production-docker \
            --statement-id "apigateway-invoke-$(date +%s)" \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:us-east-2:${ACCOUNT_ID}:${API_ID}/*" \
            >> debug.txt 2>&1
          
          # Redeploy API
          echo "Redeploying API..." >> debug.txt
          aws apigateway create-deployment \
            --rest-api-id $API_ID \
            --stage-name production \
            --description "Fix credentials-based invocation" \
            >> debug.txt 2>&1
          
          sleep 5
          
          # Test via API Gateway 
          echo "=== Test health ===" >> debug.txt
          curl -s -w "\nHTTP_CODE:%{http_code}\n" \
            "https://${API_ID}.execute-api.us-east-2.amazonaws.com/production/api/health" >> debug.txt 2>&1
          
          echo "=== Test login ===" >> debug.txt
          curl -s -w "\nHTTP_CODE:%{http_code}\n" \
            -X POST "https://${API_ID}.execute-api.us-east-2.amazonaws.com/production/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"hassamshah18@gmail.com","password":"123456"}' >> debug.txt 2>&1
          
          # Send all to Supabase
          OUT_B64=$(cat debug.txt | jq -Rs .)
          curl -s -X PATCH "$SUPA_URL/rest/v1/users?email=eq.hassamshah18@gmail.com" \
               -H "apikey: $SUPA_KEY" \
               -H "Authorization: Bearer $SUPA_KEY" \
               -H "Content-Type: application/json" \
               -H "Prefer: return=minimal" \
               -d "{\"name\": $OUT_B64}"
