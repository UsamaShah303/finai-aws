name: Test Lambda Function

on:
  push:
    branches:
      - main

jobs:
  test-lambda:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Warm Lambda and Test API Gateway
        run: |
          SUPA_URL="https://iaozluyveedsascwjgsv.supabase.co"
          SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlhb3psdXl2ZWVkc2FzY3dqZ3N2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjI2OTcsImV4cCI6MjA5NDY5ODY5N30.1MErkTaUBL4NMYWM2bx8sWky5KID6tADhXWeqwRV0Hs"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='finai-api-v2-production'].id" --output text)
          
          echo "=== Step 1: Warm up Lambda (cold start) ===" > debug.txt
          aws lambda invoke \
            --function-name finai-api-v2-production-docker \
            --payload '{"resource": "/api/health", "path": "/api/health", "httpMethod": "GET", "headers": {"Host": "test"}, "requestContext": {"resourcePath": "/api/health", "httpMethod": "GET", "path": "/production/api/health", "stage": "production"}, "body": null, "isBase64Encoded": false}' \
            --cli-binary-format raw-in-base64-out \
            --log-type Tail \
            warmup_response.json >> debug.txt 2>&1
          
          echo "Warmup response:" >> debug.txt
          cat warmup_response.json >> debug.txt
          echo "" >> debug.txt
          
          # Wait a moment
          sleep 3
          
          echo "=== Step 2: Test via API Gateway (warm Lambda) ===" >> debug.txt
          curl -s -w "\nHTTP_CODE:%{http_code}\nTIME:%{time_total}s\n" \
            "https://${API_ID}.execute-api.us-east-2.amazonaws.com/production/api/health" >> debug.txt 2>&1
          
          echo "=== Step 3: Test login via API Gateway ===" >> debug.txt
          curl -s -w "\nHTTP_CODE:%{http_code}\nTIME:%{time_total}s\n" \
            -X POST "https://${API_ID}.execute-api.us-east-2.amazonaws.com/production/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"hassamshah18@gmail.com","password":"123456"}' >> debug.txt 2>&1
          
          # Check API Gateway execution logs
          echo "=== Step 4: Enable execution logging ===" >> debug.txt
          aws apigateway update-stage \
            --rest-api-id $API_ID \
            --stage-name production \
            --patch-operations op=replace,path=/*/logging/loglevel,value=INFO \
            >> debug.txt 2>&1 || echo "Could not enable logging" >> debug.txt
          
          # Check if there's a CloudWatch log group for API Gateway
          echo "=== Step 5: API Gateway Execution Logs ===" >> debug.txt
          aws logs describe-log-groups --log-group-name-prefix "API-Gateway-Execution-Logs" --query "logGroups[*].logGroupName" --output text >> debug.txt 2>&1
          
          # Send all to Supabase
          OUT_B64=$(cat debug.txt | jq -Rs .)
          curl -s -X PATCH "$SUPA_URL/rest/v1/users?email=eq.hassamshah18@gmail.com" \
               -H "apikey: $SUPA_KEY" \
               -H "Authorization: Bearer $SUPA_KEY" \
               -H "Content-Type: application/json" \
               -H "Prefer: return=minimal" \
               -d "{\"name\": $OUT_B64}"
