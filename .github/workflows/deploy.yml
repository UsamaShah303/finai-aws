name: Full Stack AWS Deployment (CI/CD)

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy-all:
    name: Full Stack AWS Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Create Terraform State Bucket (if not exists)
        run: |
          aws s3api create-bucket \
            --bucket finai-tf-state-usama303 \
            --region us-east-2 \
            --create-bucket-configuration LocationConstraint=us-east-2 || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
          terraform_wrapper: false

      - name: Terraform Init & Apply
        working-directory: ./infra
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build & Deploy Flask Backend (Lambda via Zappa)
        working-directory: ./backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install zappa
          if ! zappa update production; then
            if ! zappa deploy production; then
              echo "Deployment failed! Fetching Zappa Lambda logs..."
              zappa tail production --num 100 || true
              exit 1
            fi
          fi
          
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Build & Deploy React Frontend
        working-directory: ./frontend
        run: |
          npm install
          
          # Fetch API URL directly from Zappa's created API Gateway
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='finai-api-v2-production'].id" --output text)
          export PROD_API_URL="https://${API_ID}.execute-api.us-east-2.amazonaws.com/production"
          echo "Using API URL: $PROD_API_URL"
          
          VITE_API_URL=$PROD_API_URL npm run build
          
          # Fetch dynamic S3 names from Terraform
          cd ../infra
          FRONTEND_BUCKET=$(terraform output -raw frontend_bucket_name)
          CLOUDFRONT_ID=$(terraform output -raw cloudfront_distribution_id)
          cd ../frontend

          aws s3 sync dist/ s3://$FRONTEND_BUCKET --delete
          aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*"
