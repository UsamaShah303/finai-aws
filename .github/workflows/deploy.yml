name: Full Stack AWS Deployment (CI/CD)

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy-all:
    name: Full Stack AWS Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Create Terraform State Bucket (if not exists)
        run: |
          aws s3api create-bucket \
            --bucket finai-tf-state-usama303 \
            --region us-east-2 \
            --create-bucket-configuration LocationConstraint=us-east-2 || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
          terraform_wrapper: false

      - name: Terraform Init & Apply
        working-directory: ./infra
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Build & Deploy Flask Backend (Lambda via Zappa)
        working-directory: ./backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install zappa

          # 1. Fetch or publish the Lambda layer
          LAYER_ARN=$(aws lambda list-layer-versions --layer-name finai-ml-layer --query "LayerVersions[0].LayerVersionArn" --output text 2>/dev/null || echo "")
          if [ "$LAYER_ARN" = "None" ] || [ -z "$LAYER_ARN" ]; then
            echo "Layer finai-ml-layer not found. Building layer..."
            
            echo "numpy==2.2.6" > requirements-layer.txt
            echo "pandas==2.2.3" >> requirements-layer.txt
            echo "pandas-datareader==0.10.0" >> requirements-layer.txt
            echo "scikit-learn==1.6.1" >> requirements-layer.txt
            echo "PyPortfolioOpt==1.5.6" >> requirements-layer.txt
            echo "cvxpy>=1.8.0" >> requirements-layer.txt
            echo "yfinance==0.2.54" >> requirements-layer.txt
            
            mkdir -p layer/python
            pip install -r requirements-layer.txt -t layer/python
            
            # Size reduction optimizations
            find layer/python -type d -name "tests" -exec rm -rf {} + || true
            find layer/python -type d -name "testing" -exec rm -rf {} + || true
            find layer/python -type d -name "__pycache__" -exec rm -rf {} + || true
            find layer/python -name "*.pyc" -delete || true
            find layer/python -name "*.so" -exec strip {} + || true
            
            cd layer
            zip -r ../ml-layer.zip python
            cd ..
            
            echo "Uploading layer to S3..."
            aws s3 cp ml-layer.zip s3://finai-zappa-deployments-bucket/ml-layer.zip
            
            echo "Publishing Lambda layer..."
            LAYER_ARN=$(aws lambda publish-layer-version \
              --layer-name finai-ml-layer \
              --description "FinAI ML dependencies layer" \
              --content S3Bucket=finai-zappa-deployments-bucket,S3Key=ml-layer.zip \
              --compatible-runtimes python3.12 \
              --query "LayerVersionArn" \
              --output text)
            echo "Layer published: $LAYER_ARN"
          else
            echo "Using existing layer: $LAYER_ARN"
          fi

          # 2. Update zappa_settings.json with the dynamic layer ARN
          python -c "import json; f=open('zappa_settings.json', 'r'); d=json.load(f); f.close(); d['production']['layers'] = ['$LAYER_ARN']; f=open('zappa_settings.json', 'w'); json.dump(d, f, indent=4); f.close()"

          # 3. Zappa deploy / update
          if ! zappa update production; then
            echo "First update attempt failed. Adding API Gateway invocation permission..."
            aws lambda add-permission \
              --function-name finai-api-v2-production \
              --statement-id AllowAPIGatewayInvoke \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com || true
            
            if ! zappa update production; then
              if ! zappa deploy production; then
                echo "Deployment failed! Invoking Lambda directly to get traceback..."
                aws lambda invoke --function-name finai-api-v2-production --payload '{"path": "/", "httpMethod": "GET"}' --cli-binary-format raw-in-base64-out response.json || true
                cat response.json || true
                echo "Fetching logs..."
                aws logs tail /aws/lambda/finai-api-v2-production || true
                exit 1
              fi
            fi
          fi
          
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Build & Deploy React Frontend
        working-directory: ./frontend
        run: |
          npm install
          
          # Fetch API URL directly from Zappa's created API Gateway
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='finai-api-v2-production'].id" --output text)
          export PROD_API_URL="https://${API_ID}.execute-api.us-east-2.amazonaws.com/production"
          echo "Using API URL: $PROD_API_URL"
          
          VITE_API_URL=$PROD_API_URL npm run build
          
          # Fetch dynamic S3 names from Terraform
          cd ../infra
          FRONTEND_BUCKET=$(terraform output -raw frontend_bucket_name)
          CLOUDFRONT_ID=$(terraform output -raw cloudfront_distribution_id)
          cd ../frontend

          aws s3 sync dist/ s3://$FRONTEND_BUCKET --delete
          aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*"
